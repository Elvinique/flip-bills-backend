name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flipbills
          POSTGRES_PASSWORD: supersecret
          POSTGRES_DB: flipbills_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      APP_ENV: test
      JWT_SECRET: ci-test-jwt-secret-32-bytes-long
      OFFLINE_QR_SECRET: ci-test-qr-secret-32-bytes-longg
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: flipbills
      POSTGRES_PASSWORD: supersecret
      POSTGRES_DB: flipbills_db
      POSTGRES_SSL_MODE: disable
      MONGO_URI: mongodb://localhost:27017
      MONGO_DB: flipbills_test
      REDIS_ADDR: localhost:6379
      TERMII_API_KEY: ""
      FLUTTERWAVE_SECRET_KEY: ""
      FLUTTERWAVE_BASE_URL: https://api.flutterwave.com/v3
      FLUTTERWAVE_WEBHOOK_SECRET: ""
      MONNIFY_API_KEY: ""
      MONNIFY_SECRET_KEY: ""
      MONNIFY_BASE_URL: https://sandbox.monnify.com
      GIGM_API_KEY: ""
      GIGM_BASE_URL: https://api.gigm.com/api
      GIGM_DISPATCHER_KEY: ""
      ABC_API_KEY: ""
      ABC_BASE_URL: https://api.abctransport.com.ng
      ABC_DISPATCHER_KEY: ""
      AMADEUS_CLIENT_ID: ""
      AMADEUS_CLIENT_SECRET: ""
      AMADEUS_BASE_URL: https://test.api.amadeus.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Go
        uses: actions/setup-go@v5.4.0
        with:
          go-version: '1.23'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Install migrate CLI
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.1/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate /usr/local/bin/migrate

      - name: Run migrations
        run: |
          migrate -path ./migrations \
            -database "postgres://flipbills:supersecret@localhost:5432/flipbills_db?sslmode=disable" up

      - name: Run tests
        run: go test -race -cover -coverprofile=coverage.out ./...

      - name: Print coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload coverage report
        uses: actions/upload-artifact@v4.6.2
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Go
        uses: actions/setup-go@v5.4.0
        with:
          go-version: '1.23'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6.5.2
        with:
          version: v1.64.8
          args: --timeout=5m

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    # Non-blocking — reports vulnerabilities but never fails the pipeline
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Go
        uses: actions/setup-go@v5.4.0
        with:
          go-version: '1.23'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run vulnerability check
        run: govulncheck ./... || true
groups:
  - name: flip_bills_api
    interval: 30s
    rules:
      # ── Availability ────────────────────────────────────────────────────────
      - alert: APIDown
        expr: up{job="flip-bills-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Flip Bills API is down"
          description: "The API has been unreachable for more than 1 minute."

      # ── Latency ─────────────────────────────────────────────────────────────
      - alert: HighP99Latency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job="flip-bills-api"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API P99 latency > 2s"
          description: "99th percentile latency is {{ $value }}s on {{ $labels.instance }}."

      # ── Error rate ──────────────────────────────────────────────────────────
      - alert: HighErrorRate
        expr: rate(http_requests_total{job="flip-bills-api",status=~"5.."}[5m]) / rate(http_requests_total{job="flip-bills-api"}[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "API 5xx error rate > 5%"
          description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.instance }}."

      # ── Transfer failures ────────────────────────────────────────────────────
      - alert: TransferFailureSpike
        expr: rate(flip_bills_transfer_failed_total[5m]) > 0.5
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Transfer failure rate is elevated"
          description: "More than 0.5 transfer failures/second in the last 5 minutes."

  - name: infrastructure
    rules:
      # ── PostgreSQL ───────────────────────────────────────────────────────────
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL exporter is down"

      - alert: PostgresHighConnections
        expr: pg_stat_activity_count > 180
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connection count > 180"
          description: "Current connections: {{ $value }}"

      # ── Redis ────────────────────────────────────────────────────────────────
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage > 90%"
          description: "Memory usage: {{ $value | humanizePercentage }}"

      # ── RabbitMQ ─────────────────────────────────────────────────────────────
      - alert: RabbitMQQueueDepthHigh
        expr: rabbitmq_queue_messages_ready > 5000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RabbitMQ queue depth > 5000 messages"
          description: "Queue: {{ $labels.queue }}, depth: {{ $value }}"

      # ── Disk ─────────────────────────────────────────────────────────────────
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space < 15% remaining on /"
          description: "{{ $value | humanizePercentage }} free on {{ $labels.instance }}"

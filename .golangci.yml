linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell
    - unconvert
  disable:
    - exhaustruct
    - wrapcheck

linters-settings:
  misspell:
    locale: US

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: cmd/api/main\.go
      linters:
        - funlen
  max-issues-per-linter: 50
  max-same-issues: 10